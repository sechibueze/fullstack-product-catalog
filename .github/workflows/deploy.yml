name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file:    ./backend/Dockerfile
          target:  production
          push:    true
          tags:    sechibueze/wfd-backend:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file:    ./frontend/Dockerfile
          target:  production
          push:    true
          tags:    sechibueze/wfd-frontend:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_APP_NAME=Product Catalog

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          port:     ${{ secrets.EC2_PORT }}
          source:   docker-compose.prod.yml
          target:   /home/ubuntu/fullstack-product-catalog/

      - name: Write env files and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          port:     ${{ secrets.EC2_PORT }}
          envs:     APP_KEY,DB_PASSWORD,NEXT_PUBLIC_API_URL,NEXT_PUBLIC_APP_URL,EC2_HOST
          script: |
            set -e
            APP_DIR=/home/ubuntu/fullstack-product-catalog
            mkdir -p "$APP_DIR/backend"

            # Root .env
            cat > "$APP_DIR/.env" <<EOF
            DB_DATABASE=product_catalog
            DB_USERNAME=wfd
            DB_PASSWORD=${DB_PASSWORD}
            NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
            NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
            NEXT_PUBLIC_APP_NAME=Product Catalog
            EOF

            # Backend .env
            cat > "$APP_DIR/backend/.env" <<EOF
            APP_NAME=Product Catalog
            APP_ENV=production
            APP_KEY=${APP_KEY}
            APP_DEBUG=false
            APP_URL=http://${EC2_HOST}:8000
            APP_TIMEZONE=UTC
            DB_CONNECTION=pgsql
            DB_HOST=db
            DB_PORT=5432
            DB_DATABASE=product_catalog
            DB_USERNAME=wfd
            DB_PASSWORD=${DB_PASSWORD}
            CACHE_STORE=redis
            CACHE_PREFIX=wfd_
            REDIS_CLIENT=phpredis
            REDIS_HOST=cache
            REDIS_PORT=6379
            REDIS_PASSWORD=null
            QUEUE_CONNECTION=sync
            SESSION_DRIVER=cookie
            SESSION_LIFETIME=120
            FRONTEND_URL=${NEXT_PUBLIC_APP_URL}
            SANCTUM_STATEFUL_DOMAINS=${EC2_HOST}:3000
            FILESYSTEM_DISK=local
            BROADCAST_CONNECTION=log
            LOG_CHANNEL=stack
            LOG_LEVEL=error
            L5_SWAGGER_GENERATE_ALWAYS=false
            L5_SWAGGER_CONST_HOST=http://${EC2_HOST}:8000/api
            EOF

            cd "$APP_DIR"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            echo "Deployed at $(date)"

        env:
          APP_KEY:              ${{ secrets.APP_KEY }}
          DB_PASSWORD:          ${{ secrets.DB_PASSWORD }}
          NEXT_PUBLIC_API_URL:  ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL:  ${{ secrets.NEXT_PUBLIC_APP_URL }}
          EC2_HOST:             ${{ secrets.EC2_HOST }}
