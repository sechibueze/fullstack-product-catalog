services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: wfd_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-product_catalog}
      POSTGRES_USER: ${DB_USERNAME:-wfd}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5431:5432'
    networks:
      - app_network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USERNAME:-wfd} -d ${DB_DATABASE:-product_catalog}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  cache:
    image: redis:7-alpine
    container_name: wfd_cache
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - '6380:6379'
    networks:
      - app_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
