services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: wfd_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-product_catalog}
      POSTGRES_USER: ${DB_USERNAME:-wfd}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5431:5432'
    networks:
      - app_network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USERNAME:-wfd} -d ${DB_DATABASE:-product_catalog}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  cache:
    image: redis:7-alpine
    container_name: wfd_cache
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - '6380:6379'
    networks:
      - app_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
  nginx:
    image: nginx:1.25
    container_name: wfd_nginx
    restart: unless-stopped
    ports:
      - '8000:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html:ro
    depends_on:
      - backend
    networks:
      - app_network
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: wfd_backend
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: wfd_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - '3000:3000'
    env_file:
      - ./frontend/.env.docker
    environment:
      - WATCHPACK_POLLING=true
    depends_on:
      - nginx
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
